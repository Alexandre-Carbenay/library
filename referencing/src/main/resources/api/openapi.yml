openapi: 3.0.3
info:
  title: Library Referencing
  description: Provides an API to reference authors, books and editions.
  contact:
    email: acarbenay@adhuc.fr
  version: 1.0.0
servers:
  - url: https://localhost:8080/api
    description: Local environment
  - url: https://referencing.library.adhuc.org/api
    description: Production environment (coming soon)
tags:
  - name: Authors
    description: Manage referencing of authors within the library.
  - name: Books
    description: Manage referencing of books within the library.
  - name: Publishers
    description: Manage referencing of publishers within the library.
  - name: Editions
    description: Manage referencing of editions within the library.
paths:
  /v1/authors:
    get:
      tags:
        - Authors
      summary: Gets a paginated list of authors based on filters.
      description: |
        The authors list can be sorted and filtered in many different ways.
      operationId: getAuthors
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '206':
          $ref: '#/components/responses/Authors'
        '400':
          $ref: '#/components/responses/InvalidPaginationParameters'
        '500':
          $ref: '#/components/responses/GeneralError'
    post:
      tags:
        - Authors
      summary: References a new author.
      description: |
        References an author to be able to reference books and editions.
      operationId: referenceAuthor
      requestBody:
        $ref: '#/components/requestBodies/ReferenceAuthor'
      responses:
        '201':
          $ref: '#/components/responses/ReferencedAuthor'
        '400':
          $ref: '#/components/responses/InvalidAuthorReferencing'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/GeneralError'
  /v1/authors/{authorId}:
    get:
      tags:
        - Authors
      summary: Gets the details of an author based on its identity.
      description: |
        The details of an author contain all its information.
      operationId: getAuthor
      parameters:
        - $ref: '#/components/parameters/AuthorId'
      responses:
        '200':
          $ref: '#/components/responses/Author'
        '400':
          $ref: '#/components/responses/InvalidAuthorId'
        '404':
          $ref: '#/components/responses/UnknownAuthor'
        '500':
          $ref: '#/components/responses/GeneralError'
  /v1/books:
    get:
      tags:
        - Books
      summary: Gets a paginated list of books based on filters.
      description: |
        The books list can be sorted and filtered in many different ways.
      operationId: getBooks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '206':
          $ref: '#/components/responses/Books'
        '400':
          $ref: '#/components/responses/InvalidPaginationParameters'
        '500':
          $ref: '#/components/responses/GeneralError'
    post:
      tags:
        - Books
      summary: References a new book.
      description: |
        References a book to be able to reference editions.
      operationId: referenceBook
      requestBody:
        $ref: '#/components/requestBodies/ReferenceBook'
      responses:
        '201':
          $ref: '#/components/responses/ReferencedBook'
        '400':
          $ref: '#/components/responses/InvalidBookReferencing'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/DuplicateBook'
        '500':
          $ref: '#/components/responses/GeneralError'
  /v1/books/{bookId}:
    get:
      tags:
        - Books
      summary: Gets the details of a book based on its identity.
      description: |
        The details of a book contain all its information.
      operationId: getBook
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          $ref: '#/components/responses/Book'
        '400':
          $ref: '#/components/responses/InvalidBookId'
        '404':
          $ref: '#/components/responses/UnknownBook'
        '500':
          $ref: '#/components/responses/GeneralError'
  /v1/publishers:
    get:
      tags:
        - Publishers
      summary: Gets a paginated list of publishers based on filters.
      description: |
        The publishers list can be sorted and filtered in many different ways.
      operationId: getPublishers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '206':
          $ref: '#/components/responses/Publishers'
        '400':
          $ref: '#/components/responses/InvalidPaginationParameters'
        '500':
          $ref: '#/components/responses/GeneralError'
    post:
      tags:
        - Publishers
      summary: References a new publisher.
      description: |
        References a publisher to be able to reference editions.
      operationId: referencePublisher
      requestBody:
        $ref: '#/components/requestBodies/ReferencePublisher'
      responses:
        '201':
          $ref: '#/components/responses/ReferencedPublisher'
        '400':
          $ref: '#/components/responses/InvalidPublisherReferencing'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/DuplicatePublisher'
        '500':
          $ref: '#/components/responses/GeneralError'
  /v1/publishers/{publisherId}:
    get:
      tags:
        - Publishers
      summary: Gets the details of a publisher based on its identity.
      description: |
        The details of a publisher contain all its information.
      operationId: getPublisher
      parameters:
        - $ref: '#/components/parameters/PublisherId'
      responses:
        '200':
          $ref: '#/components/responses/Publisher'
        '400':
          $ref: '#/components/responses/InvalidPublisherId'
        '404':
          $ref: '#/components/responses/UnknownPublisher'
        '500':
          $ref: '#/components/responses/GeneralError'
  /v1/editions:
    get:
      tags:
        - Editions
      summary: Gets a paginated list of editions based on filters.
      description: |
        The editions list can be sorted and filtered in many different ways.
      operationId: getEditions
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '206':
          $ref: '#/components/responses/Editions'
        '400':
          $ref: '#/components/responses/InvalidPaginationParameters'
        '500':
          $ref: '#/components/responses/GeneralError'
    post:
      tags:
        - Editions
      summary: References a new edition.
      description: |
        References an edition for a book.
      operationId: referenceEdition
      requestBody:
        $ref: '#/components/requestBodies/ReferenceEdition'
      responses:
        '201':
          $ref: '#/components/responses/ReferencedEdition'
        '400':
          $ref: '#/components/responses/InvalidEditionReferencing'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/DuplicateEdition'
        '500':
          $ref: '#/components/responses/GeneralError'
  /v1/editions/{isbn}:
    get:
      tags:
        - Editions
      summary: Gets the details of an edition based on its ISBN.
      description: |
        The details of an edition contain all its information.
      operationId: getEdition
      parameters:
        - $ref: '#/components/parameters/ISBN'
      responses:
        '200':
          $ref: '#/components/responses/Edition'
        '400':
          $ref: '#/components/responses/InvalidISBN'
        '404':
          $ref: '#/components/responses/UnknownEdition'
        '500':
          $ref: '#/components/responses/GeneralError'
components:
  parameters:
    AuthorId:
      name: authorId
      description: Author identity.
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 83b5bf5d-b8bc-4ea7-82dd-51d7bd1af725
    BookId:
      name: bookId
      description: Book identity.
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: b6608a30-1e9b-4ae0-a89d-624c3ca85da4
    PublisherId:
      name: publisherId
      description: Publisher identity.
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: c0c990bd-c455-40c4-92e7-0b62befb200d
    ISBN:
      name: isbn
      description: ISBN of an edition.
      in: path
      required: true
      schema:
        type: string
        example: '9782081275232'
    Page:
      name: page
      description: |
        Page number to retrieve from the collection, starting from 0. This
        parameter must be used in combination with the *size* parameter to
        specify the number of elements in a page.
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        default: 0
        example: 1
    PageSize:
      name: size
      description: |
        Size of the page to retrieve from the collection. This parameter must be
        used in combination with the *page* parameter to specify the current page.
      in: query
      required: false
      schema:
        type: number
        minimum: 1
        default: 50
        example: 50
  requestBodies:
    ReferenceAuthor:
      required: true
      description: A command to reference an author.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReferenceAuthor'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/ReferenceAuthor'
    ReferenceBook:
      required: true
      description: A command to reference a book.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReferenceBook'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/ReferenceBook'
    ReferencePublisher:
      required: true
      description: A command to reference a publisher.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReferencePublisher'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/ReferencePublisher'
    ReferenceEdition:
      required: true
      description: A command to reference an edition. The title and summary can be omitted. Then, the book's title and description in provided language, or by default original language will be used instead.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReferenceEdition'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/ReferenceEdition'
  responses:
    Authors:
      description: The referenced authors.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Authors'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Authors'
    ReferencedAuthor:
      description: The referenced author.
      headers:
        Location:
          description: Link the referenced author.
          schema:
            type: string
            example: 'https://referencing.library.adhuc.org/api/v1/authors/83b5bf5d-b8bc-4ea7-82dd-51d7bd1af725'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Author'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Author'
    InvalidAuthorReferencing:
      description: Invalid author referencing command.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidAuthorReferencing:
              $ref: '#/components/examples/InvalidAuthorReferencing'
    Books:
      description: The referenced books.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Books'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Books'
    ReferencedBook:
      description: The referenced book.
      headers:
        Location:
          description: Link the referenced book.
          schema:
            type: string
            example: 'https://referencing.library.adhuc.org/api/v1/books/b6608a30-1e9b-4ae0-a89d-624c3ca85da4'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Book'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Book'
    InvalidBookReferencing:
      description: Invalid book referencing command.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidBookReferencing:
              $ref: '#/components/examples/InvalidBookReferencing'
    DuplicateBook:
      description: |
        Duplicated book. Happens when the title / author pair is similar to another existing book. Author is considered similar if it includes all the authors from the other book, or is included in the authors from the other book.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            duplicateBook:
              $ref: '#/components/examples/DuplicateBook'
    Publishers:
      description: The referenced publishers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Publishers'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Publishers'
    ReferencedPublisher:
      description: The referenced publisher.
      headers:
        Location:
          description: Link the referenced publisher.
          schema:
            type: string
            example: 'https://referencing.library.adhuc.org/api/v1/publishers/c0c990bd-c455-40c4-92e7-0b62befb200d'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Publisher'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Publisher'
    InvalidPublisherReferencing:
      description: Invalid publisher referencing command.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidPublisherReferencing:
              $ref: '#/components/examples/InvalidPublisherReferencing'
    DuplicatePublisher:
      description: |
        Duplicated publisher. Happens when the name is similar to another existing publisher.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            duplicatePublisher:
              $ref: '#/components/examples/DuplicatePublisher'
    Editions:
      description: The referenced editions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Editions'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Editions'
    ReferencedEdition:
      description: The referenced edition.
      headers:
        Location:
          description: Link the referenced edition.
          schema:
            type: string
            example: 'https://referencing.library.adhuc.org/api/v1/editions/9782081275232'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Edition'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Edition'
    InvalidEditionReferencing:
      description: Invalid edition referencing command.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidEditionReferencing:
              $ref: '#/components/examples/InvalidEditionReferencing'
            unknownEditionBook:
              $ref: '#/components/examples/UnknownEditionBook'
            unknownEditionPublisher:
              $ref: '#/components/examples/UnknownEditionPublisher'
    DuplicateEdition:
      description: |
        Duplicated edition. Happens when the ISBN is similar to another existing edition.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            duplicateEdition:
              $ref: '#/components/examples/DuplicateEdition'
    InvalidPaginationParameters:
      description: Invalid pagination parameters.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            pageNumber:
              $ref: '#/components/examples/InvalidPageNumber'
            pageSize:
              $ref: '#/components/examples/InvalidPageSize'
    Author:
      description: A referenced author.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Author'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Author'
    InvalidAuthorId:
      description: Invalid author ID.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidId:
              $ref: '#/components/examples/InvalidUUIDId'
    UnknownAuthor:
      description: No author corresponds to the specified identity.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unknown:
              $ref: '#/components/examples/UnknownAuthor'
    Book:
      description: A referenced book.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Book'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Book'
    InvalidBookId:
      description: Invalid book ID.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidId:
              $ref: '#/components/examples/InvalidUUIDId'
    UnknownBook:
      description: No book corresponds to the specified identity.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unknown:
              $ref: '#/components/examples/UnknownBook'
    Publisher:
      description: A referenced publisher.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Publisher'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Publisher'
    InvalidPublisherId:
      description: Invalid publisher ID.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidId:
              $ref: '#/components/examples/InvalidUUIDId'
    UnknownPublisher:
      description: No publisher corresponds to the specified identity.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unknown:
              $ref: '#/components/examples/UnknownPublisher'
    Edition:
      description: A referenced edition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Edition'
        application/hal+json:
          schema:
            $ref: '#/components/schemas/Edition'
    InvalidISBN:
      description: Invalid ISBN.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalidISBN:
              $ref: '#/components/examples/InvalidISBN'
    UnknownEdition:
      description: No edition corresponds to the specified ISBN.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unknownEdition:
              $ref: '#/components/examples/UnknownEdition'
    UnauthorizedError:
      description: Unauthorized error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unauthorized:
              $ref: '#/components/examples/UnauthorizedError'
    ForbiddenError:
      description: Forbidden error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unauthorized:
              $ref: '#/components/examples/ForbiddenError'
    GeneralError:
      description: General unexpected error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            general:
              $ref: '#/components/examples/GeneralError'
  headers:
    ContentLanguage:
      schema:
        type: string
      description: |
        The language of the localized resource, ideally corresponding to one of
        those provided in the `Accept-Language` header.

        See [documentation](https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Content-Language)
        for more information about this header.
  schemas:
    Authors:
      type: object
      required:
        - page
        - '_links'
      properties:
        page:
          $ref: '#/components/schemas/Page'
        '_embedded':
          type: object
          readOnly: true
          required:
            - authors
          properties:
            authors:
              description: |
                The authors collection, containing basic information for each
                author.
              type: array
              items:
                $ref: '#/components/schemas/Author'
        '_links':
          type: object
          readOnly: true
          required:
            - self
          properties:
            self:
              description: Link to this authors page.
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/authors?page=1&size=50'
            template:
              description: Link to the template of authors page.
              type: object
              required:
                - href
                - templated
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/authors{?page,size}'
                templated:
                  type: boolean
                  enum:
                    - true
            prev:
              description: Link to the previous authors page.
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/authors?page=0&size=50'
            next:
              description: Link to the next authors page.
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/authors?page=3&size=50'
            first:
              description: Link to the first authors page.
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/authors?page=0&size=50'
            last:
              description: Link to the last authors page.
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/authors?page=8&size=50'
    Author:
      type: object
      required:
        - id
        - name
        - date_of_birth
        - '_links'
      properties:
        id:
          $ref: '#/components/schemas/AuthorId'
        name:
          $ref: '#/components/schemas/AuthorName'
        date_of_birth:
          $ref: '#/components/schemas/DateOfBirth'
        date_of_death:
          $ref: '#/components/schemas/DateOfDeath'
        '_links':
          type: object
          readOnly: true
          required:
            - self
          properties:
            self:
              $ref: '#/components/schemas/AuthorLink'
    AuthorId:
      type: string
      format: uuid
      example: 83b5bf5d-b8bc-4ea7-82dd-51d7bd1af725
    AuthorLink:
      type: object
      description: Link to the author. Can be used to see the detail of the author.
      required:
        - href
      properties:
        href:
          type: string
          example: 'https://referencing.library.adhuc.org/api/v1/authors/83b5bf5d-b8bc-4ea7-82dd-51d7bd1af725'
    AuthorName:
      type: string
      minLength: 1
      example: Jean-Jacques Rousseau
    DateOfBirth:
      type: string
      format: date
      example: 1712-06-28
    DateOfDeath:
      type: string
      format: date
      example: 1778-07-02
    ReferenceAuthor:
      type: object
      required:
        - name
        - date_of_birth
      properties:
        name:
          $ref: '#/components/schemas/AuthorName'
        date_of_birth:
          $ref: '#/components/schemas/DateOfBirth'
        date_of_death:
          $ref: '#/components/schemas/DateOfDeath'
    Books:
      type: object
      required:
        - page
        - '_links'
      properties:
        page:
          $ref: '#/components/schemas/Page'
        '_embedded':
          type: object
          readOnly: true
          required:
            - books
          properties:
            books:
              description: |
                The books collection, containing basic information for each book.
              type: array
              items:
                $ref: '#/components/schemas/Book'
        '_links':
          type: object
          readOnly: true
          required:
            - self
          properties:
            self:
              description: Link to this books page.
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/books?page=1&size=50'
            template:
              description: Link to the template of books page.
              type: object
              required:
                - href
                - templated
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/books{?page,size}'
                templated:
                  type: boolean
                  enum:
                    - true
            prev:
              description: Link to the previous books page.
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/books?page=0&size=50'
            next:
              description: Link to the next books page.
              type: object
              required:
                - href
              properties:
                href:
                  type: string
                  example: 'https://referencing.library.adhuc.org/api/v1/books?page=3&size=50'
            first:
              description: Link to the first books page.
              type: object

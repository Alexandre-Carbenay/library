    ISBN:
      type: string
      example: '9782081275232'
    PublicationDate:
      type: string
      format: date
      example: 2012-01-04
    EditionTitle:
      type: string
      example: Du contrat social
    EditionSummary:
      type: string
      example: >
        Paru en 1762, le Contrat social, en affirmant le principe de souveraineté du peuple, a constitué un tournant décisif pour la modernité et s'est imposé comme un des textes majeurs de la philosophie politique. Il a aussi acquis le statut de monument, plus célèbre que connu, plus révéré - ou honni - qu'interrogé. Retrouver, dans les formules fameuses et les pages d'anthologie, le mouvement de la réflexion et les questions vives qui nourrissent une œuvre beaucoup plus problématique qu'affirmative, c'est découvrir une pensée qui se tient au plus près des préoccupations d'aujourd'hui : comment intégrer les intérêts de tous dans la détermination de l'intérêt commun ? Comment lutter contre la pente de tout gouvernement à déposséder les citoyens de la souveraineté ? Comment former en chacun ce sentiment d'obligation sans lequel le lien social se défait ?
    EditionLink:
      type: object
      description: Link to the edition. Can be used to see the detail of the edition.
      required:
        - href
      properties:
        href:
          type: string
          example: 'https://referencing.library.adhuc.org/api/v1/editions/9782081275232'
    ReferenceEdition:
      type: object
      required:
        - isbn
        - book
        - publisher
        - publication_date
        - language
      properties:
        isbn:
          $ref: '#/components/schemas/ISBN'
        book:
          $ref: '#/components/schemas/BookId'
        publisher:
          $ref: '#/components/schemas/PublisherId'
        publication_date:
          $ref: '#/components/schemas/PublicationDate'
        language:
          $ref: '#/components/schemas/Language'
        title:
          $ref: '#/components/schemas/EditionTitle'
        summary:
          $ref: '#/components/schemas/EditionSummary'
    Page:
      type: object
      readOnly: true
      required:
        - size
        - total_elements
        - total_pages
        - number
      properties:
        size:
          description: The requested page size. The number of elements in the current page is between 0 and this size.
          type: number
          example: 50
          minimum: 0
        total_elements:
          description: The number of elements in all pages.
          type: number
          example: 443
          minimum: 0
        total_pages:
          description: The number of pages containing all the elements.
          type: number
          example: 9
          minimum: 0
        number:
          description: The current page, starting at 0.
          type: number
          example: 1
          minimum: 0
    Problem:
      type: object
      required:
        - type
        - status
        - title
        - detail
      properties:
        type:
          type: string
          format: uri-reference
          description: The problem type.
        status:
          type: integer
          description: The HTTP status of the response.
        title:
          type: string
          description: A human-readable summary of the problem type.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        errors:
          type: array
          description: An extension to the problem, providing information about each error.
          items:
            oneOf:
              - type: object
                required:
                  - detail
                  - pointer
                properties:
                  detail:
                    type: string
                    description: The error detail used to determine why the server returned an error.
                  pointer:
                    type: string
                    description: |
                      A JSON pointer (https://datatracker.ietf.org/doc/html/rfc6901) to the associated entity in the request
                      document (e.g. "/" for a primary object, "/name" for a specific attribute named "name").
              - type: object
                required:
                  - detail
                  - parameter
                properties:
                  detail:
                    type: string
                    description: The error detail used to determine why the server returned an error.
                  parameter:
                    type: string
                    description: A string indicating which URI query parameter caused the error.
  examples:
    InvalidPageNumber:
      value:
        type: /problems/invalid-request
        status: 400
        title: Request validation error
        detail: Invalid page number
        errors:
          - detail: 'Numeric instance is lower than the required minimum (minimum: 0, found: -1)'
            parameter: page
      summary: Invalid page number.
    InvalidPageSize:
      value:
        type: /problems/invalid-request
        status: 400
        title: Request validation error
        detail: Invalid page size
        errors:
          - detail: 'Numeric instance is lower than the required minimum (minimum: 1, found: 0)'
            parameter: size
      summary: Invalid page size.
    InvalidAuthorReferencing:
      value:
        type: /problems/invalid-request
        status: 400
        title: Request validation error
        detail: Invalid author referencing command
        errors:
          - detail: 'Empty string'
            pointer: '/name'
    InvalidUUIDId:
      value:
        type: /problems/invalid-request
        status: 400
        title: Request validation error
        detail: Invalid UUID id
        errors:
          - detail: 'Input string "1234" is not a valid UUID'
            parameter: id
      summary: Invalid UUID passed as id in the path.
    UnknownAuthor:
      value:
        type: /problems/unknown-entity
        status: 404
        title: Unknown author
        detail: No author exists with id '96c7774f-dd6b-43d4-bd0e-6a7d1aad09a4'
      summary: Error when no author corresponds to the specified identity.
    InvalidBookReferencing:
      value:
        type: /problems/invalid-request
        status: 400
        title: Request validation error
        detail: Invalid book referencing command
        errors:
          - detail: 'Empty string'
            pointer: '/details/0/title'
      summary: Invalid referencing request.
    DuplicateBook:
      value:
        type: /problems/duplicate-book
        status: 409
        title: Duplicate book
        detail: Book with title already exists
        errors:
          - detail: |
              Title 'Du contrat social' already exists for language 'en'
            pointer: '/details/0/title'
      summary: Duplicate Book.
    UnknownBook:
      value:
        type: /problems/unknown-entity
        status: 404
        title: Unknown book
        detail: No book exists with id '6c8f5aad-c337-43b2-b359-12ba3990ed48'
      summary: Error when no book corresponds to the specified identity.
    InvalidPublisherReferencing:
      value:
        type: /problems/invalid-request
        status: 400
        title: Request validation error
        detail: Invalid publisher referencing command
        errors:
          - detail: 'Empty string'
            pointer: '/name'
      summary: Invalid referencing request.
    DuplicatePublisher:
      value:
        type: /problems/duplicate-publisher
        status: 409
        title: Duplicate publisher
        detail: Publisher with name already exists
        errors:
          - detail: |
              Publisher 'Flammarion' already exists
            pointer: '/name'
      summary: Duplicate Publisher.
    UnknownPublisher:
      value:
        type: /problems/unknown-entity
        status: 404
        title: Unknown publisher
        detail: No publisher exists with id 'da9fb6f6-a3dd-45b6-b1ff-449c08e61d49'
      summary: Error when no publisher corresponds to the specified identity.
    InvalidISBN:
      value:
        type: /problems/invalid-request
        status: 400
        title: Request validation error
        detail: Invalid ISBN
        errors:
          - detail: 'Input string "1234" is not a valid ISBN'
            parameter: isbn
      summary: Invalid ISBN passed as edition ID in the path.
    InvalidEditionReferencing:
      value:
        type: /problems/invalid-request
        status: 400
        title: Request validation error
        detail: Invalid edition referencing command
        errors:
          - detail: 'Empty string'
            pointer: '/title'
      summary: Invalid referencing request.
    UnknownEditionBook:
      value:
        type: /problems/unknown-edition-book
        status: 400
        title: Unknown edition book
        detail: Referenced edition's book does not exist
        errors:
          - detail: "Edition with ISBN '9782081275232' cannot be referenced for unknown book 'b6608a30-1e9b-4ae0-a89d-624c3ca85da4'"
            pointer: '/book'
      summary: Unknown edition book.
    UnknownEditionPublisher:
      value:
        type: /problems/unknown-edition-publisher
        status: 400
        title: Unknown edition publisher
        detail: Referenced edition's publisher does not exist
        errors:
          - detail: "Edition with ISBN '9782081275232' cannot be referenced for unknown publisher 'c0c990bd-c455-40c4-92e7-0b62befb200d'"
            pointer: '/publisher'
      summary: Unknown edition publisher.
    DuplicateEdition:
      value:
        type: /problems/duplicate-edition
        status: 409
        title: Duplicate edition
        detail: Edition with ISBN already exists
        errors:
          - detail: |
              ISBN 9782081275232 already exists
            pointer: '/isbn'
      summary: Duplicate Edition.
    UnknownEdition:
      value:
        type: /problems/unknown-entity
        status: 404
        title: Unknown edition
        detail: No edition exists with ISBN 9782081275232
      summary: Error when no edition corresponds to the specified identity.
    UnauthorizedError:
      value:
        type: /problems/unauthorized
        status: 401
        title: Unauthorized access
        detail: Action requires authorization
      summary: Unauthorized access.
    ForbiddenError:
      value:
        type: /problems/forbidden
        status: 403
        title: Forbidden access
        detail: Action requires appropriate access rights
      summary: Forbidden access.
    GeneralError:
      value:
        type: /problems/general-error
        status: 500
        title: General error
        detail: Unexpected error
      summary: Unexpected error.

preset: 'angular'
branches:
  - 'main'
tagFormat: 'rest-api-support-v${version}'
plugins:
  - '@semantic-release/commit-analyzer'
analyzeCommits:
  - path: '@semantic-release/commit-analyzer'
    releaseRules:
      - type: 'feat'
        release: 'minor'
      - type: 'fix'
        release: 'patch'
      - type: 'chore'
        release: 'patch'
      - type: 'refactor'
        release: 'patch'

name: Continuous Delivery pipeline for shared libraries
on:
  push:
    branches:
      - 'main'
    paths:
      - 'libs/**'
      - '!**/README.md'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - 'main'
    paths:
      - 'libs/**'
      - '!**/README.md'
  workflow_dispatch:

jobs:
  build:
    name: '📦 Build'
    runs-on: [ubuntu-latest]
    permissions:
      id-token: write
      pull-requests: write
      packages: write
      contents: write
    concurrency:
      group: "${{ github.workflow }}-${{ github.ref }}"
      cancel-in-progress: true
    outputs:
      next_version: ${{ steps.semver.outputs.next_version }}
    steps:
      - name: "📥 Checkout project sources"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: "0"

      - name: "🐘 🧪 Gradle Wrapper Validation Action"
        uses: gradle/actions/wrapper-validation@v5

      - name: "☕ 🛠️ Set up JDK 21"
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: "🐘 🛠️ Setup Gradle"
        uses: gradle/actions/setup-gradle@v5

      - name: "🐘 🔨 Compile with Gradle"
        working-directory: ./libs/rest-api-support
        run: make build-compile
        timeout-minutes: 1

      - name: "🐘 🧪 Test with Gradle"
        working-directory: ./libs/rest-api-support
        run: make build-test
        timeout-minutes: 2

      - name: "🧪 📒 Publish Tests Report"
        working-directory: ./libs/rest-api-support
        run: make build-test-publish
        timeout-minutes: 1

      - name: "🐘 📦 Build artifact with Gradle"
        working-directory: ./libs/rest-api-support
        run: make build-jar
        timeout-minutes: 1

      - name: "🏷 📦 Define next version based on semantic versioning"
        id: semver
        if: github.ref == 'refs/heads/main'
        run: |
          set +e
          curl -SL https://github.com/s0ders/go-semver-release/releases/latest/download/go-semver-release-linux-amd64 -o ./go-semver-release
          chmod +x ./go-semver-release

          echo "next_version=$(./go-semver-release release . --dry-run | jq -r '.releases.[] | select(.project == "rest-api-support") | .version')" >> $GITHUB_OUTPUT

      - name: "🐘 📦 🚀 Publish artifact with Maven (main)"
        working-directory: ./libs/rest-api-support
        run: ./gradlew -Pversion=${{ steps.semver.outputs.next_version }} publish
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: '🚀 Release'
    runs-on: [ ubuntu-latest ]
    needs: [ build ]
    if: ${{ ! failure() && ! cancelled() && github.ref == 'refs/heads/main' }}
    permissions:
      id-token: write
      packages: write
      contents: write
    steps:
      - name: "📥 Checkout project sources"
        uses: actions/checkout@v6
        with:
          fetch-depth: "0"

      - name: "🏷 🌵 Tag Git branch"
        id: tag
        run: |
          git config --global --add safe.directory "$(realpath "./libs/rest-api-support")"
          git config --global user.email "username@users.noreply.github.com"
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global http.sslVerify true

          echo "next_tag="rest-api-support-v${{ needs.build.outputs.next_version }}"" >> $GITHUB_OUTPUT
          git -C ./libs/rest-api-support tag -fa ${next_tag} ${{ github.sha }} -m "${TAG_MSG}"
          git -C ./libs/rest-api-support push --force origin ${next_tag} --push-option "ci.skip"

      - name: "📦 🚀 Create Github release"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.next_tag }}
          name: "${{ steps.tag.outputs.next_tag }}"
          generate_release_notes: true
